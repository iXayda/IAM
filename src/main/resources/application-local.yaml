spring:
  config:
    activate:
      on-profile: local
  docker:
    compose:
      enabled: true

iam:
  credential:
    totp-secret-protection:
      # Local-only default. Production must provide a dedicated shared Base64 key.
      active-key-id: ${IAM_TOTP_SECRET_ACTIVE_KEY_ID:v1}
      keys:
        v1: ${IAM_TOTP_SECRET_KEY_V1:AgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgI=}
  scim:
    base-url: ${IAM_SCIM_BASE_URL:http://127.0.0.1:8080/scim/v2}
  authorization:
    server:
      issuer: ${IAM_AUTHORIZATION_ISSUER:http://127.0.0.1:8080}
      service-token-audience: ${IAM_AUTHORIZATION_SERVICE_TOKEN_AUDIENCE:http://127.0.0.1:8080/scim/v2}
      admin-token-audience: ${IAM_AUTHORIZATION_ADMIN_TOKEN_AUDIENCE:http://127.0.0.1:8080/iam/admin}
    signing-key-protection:
      # Local-only default. Production must provide a dedicated shared Base64 key.
      active-key-id: v1
      keys:
        v1: ${IAM_AUTHORIZATION_SIGNING_KEY_V1:AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
    token-protection:
      # Local-only default. Production must provide a different shared Base64 key.
      active-key-id: v1
      keys:
        v1: ${IAM_AUTHORIZATION_TOKEN_KEY_V1:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  security-state:
    # Local-only default. Production must provide a dedicated shared Base64 secret.
    key-secret: ${IAM_SECURITY_STATE_KEY_SECRET:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  ratelimit:
    login:
      # Local-only default. Production must provide a shared 32-byte Base64 secret.
      key-secret: ${IAM_LOGIN_RATE_LIMIT_KEY_SECRET:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

management:
  otlp:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
