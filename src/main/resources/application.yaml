spring:
  application:
    name: iam-core-service
  datasource:
    hikari:
      data-source-properties:
        logServerErrorDetail: false
  docker:
    compose:
      enabled: false
      file: compose.yaml
  flyway:
    baseline-on-migrate: false
    clean-disabled: true
    fail-on-missing-locations: true
    locations: classpath:db/migration
    out-of-order: false
    validate-migration-naming: true
    validate-on-migrate: true
  sql:
    init:
      mode: never
  data:
    redis:
      connect-timeout: 1s
      repositories:
        enabled: false
      timeout: 1s

management:
  health:
    ldap:
      # Optional directory outages must not make local authentication unhealthy.
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db,redis,loginRateLimit,securityState
      probes:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: false

iam:
  security-state:
    key-secret: ${IAM_SECURITY_STATE_KEY_SECRET:}
  ratelimit:
    login:
      key-secret: ${IAM_LOGIN_RATE_LIMIT_KEY_SECRET:}
  credential:
    external:
      ldap:
        enabled: false
