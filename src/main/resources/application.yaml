spring:
  application:
    name: iam-core-service
  datasource:
    hikari:
      connection-timeout: 3000
      data-source-properties:
        connectTimeout: 3
        logServerErrorDetail: false
        socketTimeout: 3
      validation-timeout: 1000
  docker:
    compose:
      enabled: false
      file: compose.yaml
  flyway:
    baseline-on-migrate: false
    clean-disabled: true
    fail-on-missing-locations: true
    locations: classpath:db/migration
    out-of-order: false
    validate-migration-naming: true
    validate-on-migrate: true
  sql:
    init:
      mode: never
  data:
    redis:
      connect-timeout: 1s
      repositories:
        enabled: false
      timeout: 1s

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "

management:
  health:
    ldap:
      # Optional directory outages must not make local authentication unhealthy.
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db,redis,loginRateLimit,securityState
      probes:
        add-additional-paths: true
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,2s
    tags:
      application: ${spring.application.name}
      environment: ${IAM_DEPLOYMENT_ENVIRONMENT:unknown}
  opentelemetry:
    resource-attributes:
      deployment.environment.name: ${IAM_DEPLOYMENT_ENVIRONMENT:unknown}
      service.namespace: ${IAM_SERVICE_NAMESPACE:ixayda}
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    exemplars:
      include: sampled-traces
    sampling:
      probability: 0.1

iam:
  security-state:
    key-secret: ${IAM_SECURITY_STATE_KEY_SECRET:}
  ratelimit:
    login:
      key-secret: ${IAM_LOGIN_RATE_LIMIT_KEY_SECRET:}
  credential:
    external:
      ldap:
        enabled: false
